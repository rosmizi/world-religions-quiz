<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kembara Agama - Zoroastrianism Interactive Arena</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.6);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.4);
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-indigo-500/30">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // 🔊 AUDIO SYNTH ENGINE (WEB AUDIO API)
    // ==========================================
    class EducationalSoundSynth {
      constructor() {
        this.ctx = null;
        this.bgmInterval = null;
        this.isMuted = false;
      }

      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      playCorrect() {
        if (this.isMuted) return;
        this.init();
        const now = this.ctx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
        notes.forEach((freq, idx) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + idx * 0.06);
          gain.gain.setValueAtTime(0.25, now + idx * 0.06);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.06 + 0.4);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now + idx * 0.06);
          osc.stop(now + idx * 0.06 + 0.45);
        });
      }

      playWrong() {
        if (this.isMuted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.linearRampToValueAtTime(80, now + 0.35);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(155, now);
        osc2.frequency.linearRampToValueAtTime(85, now + 0.35);
        gain.gain.setValueAtTime(0.22, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(this.ctx.destination);
        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 0.35);
        osc2.stop(now + 0.35);
      }

      startBGM() {
        if (this.isMuted) return;
        this.init();
        if (this.bgmInterval) return;
        let step = 0;
        const melody = [329.63, 392.00, 440.00, 392.00, 329.63, 392.00, 440.00, 349.23];
        const playStep = () => {
          const now = this.ctx.currentTime;
          const note = melody[step % melody.length];
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(note, now);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.85);
          step++;
        };
        this.bgmInterval = setInterval(playStep, 500);
      }

      stopBGM() {
        if (this.bgmInterval) {
          clearInterval(this.bgmInterval);
          this.bgmInterval = null;
        }
      }

      toggleMute() {
        this.isMuted = !this.isMuted;
        if (this.isMuted) this.stopBGM();
        else this.startBGM();
        return this.isMuted;
      }
    }

    // ==========================================
    // 📚 QUIZ DATA (ZOROASTRIANISM TOPICS)
    // ==========================================
    const QUESTIONS = [
      {
        q: "In which geographical region do historical estimations place the birth of Zarathustra?",
        qM: "Di manakah kawasan geografi yang dikaitkan oleh ahli sejarah sebagai tempat lahir Zarathustra?",
        options: [
          { text: "Azerbaijan (Northern/Northwestern Iran)", textM: "Azerbaijan (Utara/Barat Laut Iran)", isCorrect: true },
          { text: "Mesopotamia (Modern Iraq)", textM: "Mesopotamia (Iraq Moden)" },
          { text: "Persepolis (Southern Iran)", textM: "Persepolis (Selatan Iran)" },
          { text: "The Arabian Peninsula", textM: "Semenanjung Arab" }
        ],
        hint: "This rugged mountainous area in Northwestern Iran is central to his early life.",
        hintM: "Kawasan bergunung-ganang di Barat Laut Iran ini sangat penting bagi awal hidupnya.",
        tip: "Historians and scriptures suggest Zarathustra was born in Northwestern Iran/Azerbaijan in the Spitama clan.",
        tipM: "Sejarahwan dan kitab suci mencatatkan bahawa Zarathustra dilahirkan di Barat Laut Iran/Azerbaijan dalam puak Spitama."
      },
      {
        q: "Zarathustra belonged to which ancient noble and priestly lineage?",
        qM: "Zarathustra tergolong dalam keturunan bangsawan dan golongan pendeta purba yang mana?",
        options: [
          { text: "The Spitama Clan", textM: "Puak Spitama", isCorrect: true },
          { text: "The Sasanian Clan", textM: "Puak Sasanian" },
          { text: "The Achaemenid Lineage", textM: "Keturunan Achaemenid" },
          { text: "The Parthian Dynasty", textM: "Dinasti Parthian" }
        ],
        hint: "The name of this lineage translates to 'of brilliant or white descent'.",
        hintM: "Nama keturunan ini diterjemahkan sebagai 'daripada keturunan yang putih berkilau'.",
        tip: "Zarathustra came from the Spitama family, a family revered for spiritual devotion.",
        tipM: "Zarathustra berasal daripada keluarga Spitama, sebuah keluarga yang dihormati dalam hal keagamaan."
      },
      {
        q: "Who were the parents of the prophet Zarathustra according to historical records?",
        qM: "Siapakah nama ibu bapa nabi Zarathustra menurut catatan sejarah?",
        options: [
          { text: "Pourushaspa and Dughdova", textM: "Pourushaspa dan Dughdova", isCorrect: true },
          { text: "King Vishtaspa and Hutosa", textM: "Raja Vishtaspa dan Hutosa" },
          { text: "Cyrus the Great and Cassandane", textM: "Cyrus Agung dan Cassandane" },
          { text: "Darius and Atossa", textM: "Darius dan Atossa" }
        ],
        hint: "His father's name relates to horses, and his mother's name means 'maiden of light'.",
        hintM: "Nama bapanya mempunyai maksud berkaitan kuda, dan ibunya bermaksud 'gadis cahaya'.",
        tip: "His father, Pourushaspa, and his mother, Dughdova, brought up Zarathustra despite early magical threats.",
        tipM: "Bapanya, Pourushaspa, dan ibunya, Dughdova, membesarkan Zarathustra walaupun menghadapi ancaman sihir awal."
      },
      {
        q: "What miraculous baby behavior is unique to Zarathustra at the moment of his birth?",
        qM: "Apakah kelakuan ajaib bayi yang unik kepada Zarathustra ketika beliau dilahirkan?",
        options: [
          { text: "He laughed out loud instead of crying", textM: "Beliau ketawa riang dan bukannya menangis", isCorrect: true },
          { text: "He pointed towards the eastern sky", textM: "Beliau menunjuk ke arah langit timur" },
          { text: "A small flame burned gently on his head", textM: "Api kecil menyala lembut di kepalanya" },
          { text: "He spoke clearly to comfort his mother", textM: "Beliau berkata-kata dengan jelas untuk menenangkan ibunya" }
        ],
        hint: "His joyous laughter signaled the ultimate triumph of optimism over dark spiritual forces.",
        hintM: "Ketawa gembiranya menandakan kemenangan muktamad cahaya ke atas kuasa gelap.",
        tip: "The sacred texts highlight that Zarathustra laughed at birth, scattering dark elements and evil spirits.",
        tipM: "Kitab suci menekankan bahawa Zarathustra ketawa semasa lahir, menakutkan unsur-unsur gelap dan roh jahat."
      }
    ];

    function App() {
      // 💡 SET TO 'cover' BY DEFAULT SO THE INTRO SCREEN SHOWS FIRST
      const [gameState, setGameState] = useState('cover'); 
      const [lang, setLang] = useState('ms'); 
      const [playerName, setPlayerName] = useState('');
      
      const [currentQIdx, setCurrentQIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [chosenOption, setChosenOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [hintOpen, setHintOpen] = useState(false);
      const [modalOpen, setModalOpen] = useState(false);
      
      const [synth] = useState(() => new EducationalSoundSynth());
      const [isMuted, setIsMuted] = useState(false);

      useEffect(() => {
        if (gameState === 'quiz') {
          synth.startBGM();
        } else {
          synth.stopBGM();
        }
        return () => synth.stopBGM();
      }, [gameState, synth]);

      const toggleAudio = () => {
        const status = synth.toggleMute();
        setIsMuted(status);
      };

      const handleStartGame = (e) => {
        e.preventDefault();
        setGameState('quiz');
      };

      const handleOptionSelect = (option) => {
        if (isAnswered) return;
        setChosenOption(option);
        setIsAnswered(true);
        if (option.isCorrect) {
          setScore(prev => prev + 1);
          synth.playCorrect();
        } else {
          synth.playWrong();
        }
        setModalOpen(true);
      };

      const handleNextQuestion = () => {
        setModalOpen(false);
        setIsAnswered(false);
        setChosenOption(null);
        setHintOpen(false);
        
        if (currentQIdx + 1 < QUESTIONS.length) {
          setCurrentQIdx(prev => prev + 1);
        } else {
          setGameState('scoreboard');
        }
      };

      const handleRetryQuestion = () => {
        setModalOpen(false);
        setIsAnswered(false);
        setChosenOption(null);
      };

      const currentQuestion = QUESTIONS[currentQIdx];

      return (
        <div className="max-w-xl mx-auto min-h-screen px-4 py-6 flex flex-col justify-between">
          
          {/* --- BRAND HEADER --- */}
          <header className="flex justify-between items-center bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg">
            <div>
              <span className="text-xs uppercase tracking-widest font-black text-indigo-400 block">Siri Pembelajaran Digital Dr. MRAR</span>
              <h1 className="text-xl font-black text-white flex items-center gap-1.5 mt-0.5">
                <span>🔥 Kembara Agama</span>
              </h1>
            </div>
            <button type="button" onClick={toggleAudio} className="p-2.5 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-slate-300">
              {isMuted ? '🔇 Muted' : '🔊 Sound On'}
            </button>
          </header>

          {/* --- SCREEN CONTROLLER --- */}
          {gameState === 'cover' && (
            <div className="my-auto py-8 text-center">
              <span className="text-5xl block mb-4">👑</span>
              <h2 className="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-orange-400 to-red-500 uppercase">
                ZOROASTRIANISM INTERACTIVE ARENA
              </h2>
              <p className="text-sm font-bold text-yellow-400 italic mt-2">
                Kuiz Edu-Game Berdasarkan Buku Teks Agama & Sejarah
              </p>

              {/* Book Track References */}
              <div className="grid grid-cols-2 gap-3 my-6">
                <div className="bg-slate-900/80 border border-slate-800 p-3 rounded-xl text-left">
                  <span className="text-[10px] font-bold text-amber-400 block uppercase">Book 1 / Buku 1:</span>
                  <span className="text-xs text-slate-300 font-semibold">History and Development</span>
                </div>
                <div className="bg-slate-900/80 border border-slate-800 p-3 rounded-xl text-left">
                  <span className="text-[10px] font-bold text-emerald-400 block uppercase">Book 2 / Buku 2:</span>
                  <span className="text-xs text-slate-300 font-semibold">Beliefs, Rites, and Rituals</span>
                </div>
              </div>

              {/* Features List Box */}
              <div className="bg-slate-900/60 border border-slate-800 p-5 rounded-xl text-left text-xs space-y-3 mb-6">
                <p className="font-bold text-slate-400 uppercase tracking-wider text-[11px]">Ciri Edu-Game Menarik:</p>
                <p className="text-slate-300"><span className="text-amber-400 mr-1.5">⭐</span> <strong>Kad Bintang:</strong> Jawab cepat & tepat untuk simpan 3 bintang penuh!</p>
                <p className="text-slate-300"><span className="text-red-400 mr-1.5">🎀</span> <strong>Riben & Bunga Api:</strong> Perayaan gembira muncul setiap kali jawapan betul.</p>
                <p className="text-slate-300"><span className="text-yellow-300 mr-1.5">💡</span> <strong>Popup Cuba Lagi:</strong> Menerangkan kesilapan secara saintifik & akademik.</p>
              </div>

              {/* Language Selector before entering */}
              <div className="bg-slate-900 border border-slate-800 p-1 rounded-xl flex gap-2 mb-6 max-w-xs mx-auto">
                <button type="button" onClick={() => setLang('ms')} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition ${lang === 'ms' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>🇲🇾 BM</button>
                <button type="button" onClick={() => setLang('en')} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition ${lang === 'en' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>🇬🇧 EN</button>
              </div>

              {/* Big Vibrant Action Button */}
              <button 
                type="button" 
                onClick={() => setGameState('quiz')}
                className="w-full sm:w-2/3 py-4 bg-gradient-to-r from-amber-500 via-orange-500 to-red-600 text-slate-950 font-black rounded-xl text-sm tracking-widest shadow-xl uppercase transition transform hover:scale-[1.02] active:scale-[0.98]"
              >
                START GAME / MULA BERMAIN 🎮
              </button>
            </div>
          )}

          {gameState === 'quiz' && (
            <div className="my-auto py-4">
              {/* Score & Progress Panel */}
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-3 mb-4 flex justify-between items-center text-xs">
                <span className="font-bold uppercase tracking-wider text-slate-400">
                  SOALAN / QUESTION {currentQIdx + 1} DARIPADA {QUESTIONS.length}
                </span>
                <span className="bg-indigo-950 border border-indigo-500/30 text-indigo-400 px-3 py-1 rounded-full font-black">
                  Skor: {score}
                </span>
              </div>

              {/* Prompt Block */}
              <div className="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl mb-5">
                <h3 className="text-base sm:text-lg font-bold text-slate-100 leading-relaxed mb-2">
                  {lang === 'ms' && currentQuestion.qM ? currentQuestion.qM : currentQuestion.q}
                </h3>
                <p className="text-slate-400 italic text-xs border-l-2 border-indigo-500/40 pl-3 leading-relaxed">
                  {lang === 'ms' ? currentQuestion.q : currentQuestion.qM}
                </p>
              </div>

              {/* Choices Options Stack */}
              <div className="space-y-3">
                {currentQuestion.options.map((opt, idx) => {
                  let buttonStyle = "bg-slate-900/40 border-slate-800 hover:border-slate-700 hover:bg-slate-900/80 text-slate-300";
                  if (isAnswered) {
                    if (opt.isCorrect) buttonStyle = "bg-emerald-950/40 border-emerald-500 text-emerald-300";
                    else if (chosenOption === opt) buttonStyle = "bg-rose-950/40 border-rose-500 text-rose-300";
                    else buttonStyle = "bg-slate-900/10 border-slate-950 text-slate-600 opacity-50";
                  }

                  return (
                    <button 
                      type="button"
                      key={idx}
                      onClick={() => handleOptionSelect(opt)}
                      disabled={isAnswered}
                      className={`w-full text-left p-4 rounded-xl border text-sm flex flex-col ${buttonStyle}`}
                    >
                      <span className="font-semibold text-white">{lang === 'ms' && opt.textM ? opt.textM : opt.text}</span>
                      <span className="italic text-xs mt-0.5 opacity-70 font-medium">{lang === 'ms' ? opt.text : opt.textM}</span>
                    </button>
                  );
                })}
              </div>

              {/* Hints Button */}
              <div className="mt-4">
                <button 
                  type="button"
                  onClick={() => setHintOpen(!hintOpen)}
                  className="text-xs font-bold text-slate-400 hover:text-slate-200"
                >
                  💡 {lang === 'ms' ? 'Papar Petunjuk Buku Teks' : 'Show Textbook Hint'}
                </button>
                {hintOpen && (
                  <div className="mt-2 bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-slate-300 leading-relaxed">
                    {lang === 'ms' ? currentQuestion.hintM : currentQuestion.hint}
                  </div>
                )}
              </div>
            </div>
          )}

          {gameState === 'scoreboard' && (
            <div className="my-auto bg-slate-900/60 p-8 rounded-2xl border border-slate-800 text-center shadow-2xl">
              <span class="text-5xl">🏆</span>
              <h2 className="text-2xl font-black text-white mt-4">Tahniah Selesai!</h2>
              <p className="text-slate-400 text-xs mt-1 uppercase tracking-widest font-bold">Kembara Modul Tamat</p>
              
              <div className="inline-block bg-indigo-950/30 border border-indigo-500/30 rounded-2xl px-10 py-5 my-6 shadow-inner">
                <p className="text-[10px] text-indigo-300 uppercase font-black tracking-widest">Skor Akhir Anda</p>
                <p className="text-5xl font-black text-indigo-400 mt-1">{score} / {QUESTIONS.length}</p>
              </div>

              <button 
                type="button"
                onClick={() => {
                  setCurrentQIdx(0);
                  setScore(0);
                  setGameState('cover');
                  setIsAnswered(false);
                }} 
                className="w-full py-4 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-black rounded-xl text-xs tracking-widest shadow-lg uppercase"
              >
                🔄 Ulang Kuiz Baru / Restart
              </button>
            </div>
          )}

          {/* --- INSIGHT POPUP MODAL --- */}
          {modalOpen && chosenOption && (
            <div className="fixed inset-0 bg-slate-950/80 z-50 flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 w-full max-w-md p-6 rounded-2xl shadow-2xl flex flex-col">
                
                <div className="text-center mb-4">
                  {chosenOption.isCorrect ? (
                    <h4 className="text-lg font-black text-emerald-400 uppercase tracking-widest">✨ Tepat Sekali!</h4>
                  ) : (
                    <h4 className="text-lg font-black text-rose-400 uppercase tracking-widest">❌ Cuba Lagi</h4>
                  )}
                </div>

                <div className="bg-slate-950/50 border border-slate-800 rounded-xl p-4 mb-5">
                  <p className="text-[10px] uppercase tracking-widest text-indigo-400 font-black">Penerangan Akademik / Explanation:</p>
                  <p className="text-slate-200 text-xs mt-1.5 leading-relaxed">
                    {lang === 'ms' ? currentQuestion.tipM : currentQuestion.tip}
                  </p>
                </div>

                {chosenOption.isCorrect ? (
                  <button type="button" onClick={handleNextQuestion} className="w-full py-3.5 bg-emerald-600 text-white font-black rounded-xl text-xs uppercase tracking-wider">
                    Seterusnya ➡
                  </button>
                ) : (
                  <button type="button" onClick={handleRetryQuestion} className="w-full py-3.5 bg-rose-600 text-white font-black rounded-xl text-xs uppercase tracking-wider">
                    🔄 Cuba Semula Soalan
                  </button>
                )}
              </div>
            </div>
          )}

          {/* --- FOOTER --- */}
          <footer className="bg-slate-950 text-center py-4 border-t border-slate-900 text-[10px] text-slate-600 tracking-wider">
            <p>© 2026 Dr. MRAR. Hak Cipta Terpelihara.</p>
          </footer>
          
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
