    // 🔊 AUDIO SYNTH ENGINE (WEB AUDIO API)

    class EducationalSoundSynth {
      constructor() {
        this.ctx = null;
        this.bgmInterval = null;
        this.isMuted = false;
      }

      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      playCorrect() {
        if (this.isMuted) return;
        this.init();
        const now = this.ctx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
        notes.forEach((freq, idx) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + idx * 0.06);
          gain.gain.setValueAtTime(0.25, now + idx * 0.06);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.06 + 0.4);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now + idx * 0.06);
          osc.stop(now + idx * 0.06 + 0.45);
        });
      }

      playWrong() {
        if (this.isMuted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.linearRampToValueAtTime(80, now + 0.35);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(155, now);
        osc2.frequency.linearRampToValueAtTime(85, now + 0.35);
        gain.gain.setValueAtTime(0.22, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(this.ctx.destination);
        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 0.35);
        osc2.stop(now + 0.35);
      }

      startBGM() {
        if (this.isMuted) return;
        this.init();
        if (this.bgmInterval) return;
        let step = 0;
        const melody = [329.63, 392.00, 440.00, 392.00, 329.63, 392.00, 440.00, 349.23];
        const playStep = () => {
          const now = this.ctx.currentTime;
          const note = melody[step % melody.length];
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(note, now);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.85);
          step++;
        };
        this.bgmInterval = setInterval(playStep, 500);
      }

      stopBGM() {
        if (this.bgmInterval) {
          clearInterval(this.bgmInterval);
          this.bgmInterval = null;
        }
      }

      toggleMute() {
        this.isMuted = !this.isMuted;
        if (this.isMuted) this.stopBGM();
        else this.startBGM();
        return this.isMuted;
      }
    }
