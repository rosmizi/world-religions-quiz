<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kembara Agama - Quiz 5: Zoroastrianism</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Prevent text selection and optimize mobile view */
    body {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-indigo-500/30">

  <div id="root"></div>

  <script type="text/babel">
    
    // ==========================================
    // YOUR ORIGINAL CODE STARTS HERE
    // ==========================================

    class EducationalSoundSynth {
      constructor() {
        this.ctx = null;
        this.bgmInterval = null;
        this.isMuted = false;
      }

      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      playCorrect() {
        if (this.isMuted) return;
        this.init();
        const now = this.ctx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
        notes.forEach((freq, idx) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + idx * 0.06);
          gain.gain.setValueAtTime(0.25, now + idx * 0.06);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.06 + 0.4);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now + idx * 0.06);
          osc.stop(now + idx * 0.06 + 0.45);
        });
      }

      playWrong() {
        if (this.isMuted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.linearRampToValueAtTime(80, now + 0.35);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(155, now);
        osc2.frequency.linearRampToValueAtTime(0.01, now + 0.35);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(this.ctx.destination);
        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 0.35);
        osc2.stop(now + 0.35);
        gain.gain.setValueAtTime(0.18, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      }

      startBGM() {
        if (this.isMuted) return;
        this.init();
        if (this.bgmInterval) return;
        let step = 0;
        const melody = [329.63, 392.00, 440.00, 392.00, 329.63, 392.00, 440.00, 349.23];
        const playStep = () => {
          const now = this.ctx.currentTime;
          const note = melody[step % melody.length];
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(note, now);
          gain.gain.setValueAtTime(0.06, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.85);
          if (step % 2 === 0) {
            const pulseOsc = this.ctx.createOscillator();
            const pulseGain = this.ctx.createGain();
            pulseOsc.type = 'triangle';
            pulseOsc.frequency.setValueAtTime(note / 2, now);
            pulseGain.gain.setValueAtTime(0.04, now);
            pulseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            pulseOsc.connect(pulseGain);
            pulseGain.connect(this.ctx.destination);
            pulseOsc.start(now);
            pulseOsc.stop(now + 0.45);
          }
          step++;
        };
        this.bgmInterval = setInterval(playStep, 500);
      }

      toggleMute() {
        this.isMuted = !this.isMuted;
        if (this.isMuted) {
          if (this.bgmInterval) {
            clearInterval(this.bgmInterval);
            this.bgmInterval = null;
          }
        } else {
          this.startBGM();
        }
        return this.isMuted;
      }
    }

    const QUIZ_SETS = [
      {
        id: 1,
        book: "Book 1: History and Development",
        bookMalay: "Buku 1: Sejarah dan Perkembangan",
        title: "Origins & Zarathustra's Mission",
        malayTitle: "Asal-usul & Misi Perjuangan Zarathustra",
        description: "Explore the miraculous birth, Spitama clan origins, and Zarathustra's divine mission to reform ancient Persian religion.",
        malayDescription: "Terokai kelahiran ajaib, asal-usul puak Spitama, dan misi suci Zarathustra dalam memperbaharui kepercayaan Parsi purba.",
        color: "from-amber-400 to-orange-500",
        questions: [
          {
            q: "In which geographical region do historical estimations place the birth of Zarathustra?",
            qM: "Di manakah kawasan geografi yang dikaitkan oleh ahli sejarah sebagai tempat lahir Zarathustra?",
            options: [
              { text: "Azerbaijan (Northern/Northwestern Iran)", textM: "Azerbaijan (Utara/Barat Laut Iran)", isCorrect: true },
              { text: "Mesopotamia (Modern Iraq)", textM: "Mesopotamia (Iraq Moden)" },
              { text: "Persepolis (Southern Iran)", textM: "Persepolis (Selatan Iran)" },
              { text: "The Arabian Peninsula", textM: "Semenanjung Arab" }
            ],
            hint: "This rugged mountainous area in Northwestern Iran is central to his early life.",
            hintM: "Kawasan bergunung-ganang di Barat Laut Iran ini sangat penting bagi awal hidupnya.",
            tip: "Historians and scriptures suggest Zarathustra was born in Northwestern Iran/Azerbaijan in the Spitama clan.",
            tipM: "Sejarawan dan kitab suci mencatatkan bahawa Zarathustra dilahirkan di Barat Laut Iran/Azerbaijan dalam puak Spitama."
          },
          {
            q: "Zarathustra belonged to which ancient noble and priestly lineage?",
            qM: "Zarathustra tergolong dalam keturunan bangsawan dan golongan pendeta purba yang mana?",
            options: [
              { text: "The Spitama Clan", textM: "Puak Spitama", isCorrect: true },
              { text: "The Sasanian Clan", textM: "Puak Sasanian" },
              { text: "The Achaemenid Lineage", textM: "Keturunan Achaemenid" },
              { text: "The Parthian Dynasty", textM: "Dinasti Parthian" }
            ],
            hint: "The name of this lineage translates to 'of brilliant or white descent'.",
            hintM: "Nama keturunan ini diterjemahkan sebagai 'daripada keturunan yang putih berkilau'.",
            tip: "Zarathustra came from the Spitama family, a family revered for spiritual devotion.",
            tipM: "Zarathustra berasal daripada keluarga Spitama, sebuah keluarga yang dihormati dalam hal keagamaan."
          },
          {
            q: "Who were the parents of the prophet Zarathustra according to historical records?",
            qM: "Siapakah nama ibu bapa nabi Zarathustra menurut catatan sejarah?",
            options: [
              { text: "Pourushaspa and Dughdova", textM: "Pourushaspa dan Dughdova", isCorrect: true },
              { text: "King Vishtaspa and Hutosa", textM: "Raja Vishtaspa dan Hutosa" },
              { text: "Cyrus the Great and Cassandane", textM: "Cyrus Agung dan Cassandane" },
              { text: "Darius and Atossa", textM: "Darius dan Atossa" }
            ],
            hint: "His father's name relates to horses, and his mother's name means 'maiden of light'.",
            hintM: "Nama bapanya mempunyai maksud berkaitan kuda, dan ibunya bermaksud 'gadis cahaya'.",
            tip: "His father, Pourushaspa, and his mother, Dughdova, raised Zarathustra despite early magical threats.",
            tipM: "Bapanya, Pourushaspa, dan ibunya, Dughdova, membesarkan Zarathustra walaupun menghadapi ancaman sihir awal."
          },
          {
            q: "What miraculous baby behavior is unique to Zarathustra at the moment of his birth?",
            qM: "Apakah kelakuan ajaib bayi yang unik kepada Zarathustra ketika beliau dilahirkan?",
            options: [
              { text: "He laughed out loud instead of crying", textM: "Beliau ketawa riang dan bukannya menangis", isCorrect: true },
              { text: "He pointed towards the eastern sky", textM: "Beliau menunjuk ke arah langit timur" },
              { text: "A small flame burned gently on his head", textM: "Api kecil menyala lembut di kepalanya" },
              { text: "He spoke clearly to comfort his mother", textM: "Beliau berkata-kata dengan jelas untuk menenangkan ibunya" }
            ],
            hint: "His joyous laughter signaled the ultimate triumph of optimism over dark spiritual forces.",
            hintM: "Ketawa gembiranya menandakan kemenangan muktamad cahaya ke atas kuasa kegelapan.",
            tip: "The sacred texts highlight that Zarathustra laughed at birth, scattering dark spirits and evil entities.",
            tipM: "Kitab suci menekankan bahawa Zarathustra ketawa semasa lahir, menyebabkan roh gelap dan entiti jahat bertempiaran lari."
          }
        ]
      }
    ];

    // Simple placeholder UI wrapper to replace imports
    function QuizApp() {
      const [currentQuestionIdx, setCurrentQuestionIdx] = React.useState(0);
      const [score, setScore] = React.useState(0);
      const [showScore, setShowScore] = React.useState(false);
      const [selectedOption, setSelectedOption] = React.useState(null);
      const [isAnswered, setIsAnswered] = React.useState(false);
      const [showHint, setShowHint] = React.useState(false);
      const [showTipModal, setShowTipModal] = React.useState(false);
      const [synth] = React.useState(() => new EducationalSoundSynth());
      const [muted, setMuted] = React.useState(false);

      const activeQuiz = QUIZ_SETS[0];
      const activeQuestion = activeQuiz.questions[currentQuestionIdx];

      React.useEffect(() => {
        synth.startBGM();
        return () => clearInterval(synth.bgmInterval);
      }, [synth]);

      const handleOptionClick = (option) => {
        if (isAnswered) return;
        setSelectedOption(option);
        setIsAnswered(true);
        if (option.isCorrect) {
          setScore(score + 1);
          synth.playCorrect();
        } else {
          synth.playWrong();
        }
        setShowTipModal(true);
      };

      const handleNext = () => {
        setShowTipModal(false);
        setIsAnswered(false);
        setSelectedOption(null);
        setShowHint(false);
        if (currentQuestionIdx + 1 < activeQuiz.questions.length) {
          setCurrentQuestionIdx(currentQuestionIdx + 1);
        } else {
          setShowScore(true);
        }
      };

      const handleManualTryAgainDismiss = () => {
        setShowTipModal(false);
        setIsAnswered(false);
        setSelectedOption(null);
      };

      const toggleMute = () => {
        const isMuted = synth.toggleMute();
        setMuted(isMuted);
      };

      const restartQuiz = () => {
        setCurrentQuestionIdx(0);
        setScore(0);
        setShowScore(false);
        setIsAnswered(false);
        setSelectedOption(null);
        setShowHint(false);
        setShowTipModal(false);
      };

      return (
        <div class="max-w-2xl mx-auto p-4 sm:p-6 min-h-screen flex flex-col justify-between">
          <header class="flex justify-between items-center bg-slate-900/80 p-4 rounded-xl border border-slate-800 backdrop-blur">
            <div>
              <h1 class="text-lg font-black text-indigo-400">🔥 Kembara Agama</h1>
              <p class="text-xs text-slate-400">Siri Pembelajaran Digital Dr. MRAR</p>
            </div>
            <button onClick={toggleMute} class="p-2 bg-slate-800 rounded-lg text-sm">
              {muted ? "🔇 Muted" : "🔊 Sound On"}
            </button>
          </header>

          {showScore ? (
            <div class="my-auto bg-slate-900/60 p-8 rounded-2xl border border-slate-800/80 text-center backdrop-blur shadow-2xl">
              <span class="text-5xl">🏆</span>
              <h2 class="text-2xl font-black text-white mt-4">Tamat Kuiz! / Quiz Completed!</h2>
              <p class="text-slate-400 text-sm mt-1">{activeQuiz.bookMalay}</p>
              <div class="inline-block bg-indigo-950/40 border border-indigo-500/30 rounded-2xl px-8 py-4 my-6">
                <p class="text-xs text-indigo-300 uppercase font-black tracking-wider">Skor Anda / Your Score</p>
                <p class="text-4xl font-black text-indigo-400 mt-1">{score} / {activeQuiz.questions.length}</p>
              </div>
              <button onClick={restartQuiz} class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black rounded-xl text-sm transition tracking-wider shadow-lg">
                🔄 Main Semula / Play Again
              </button>
            </div>
          ) : (
            <main class="my-auto py-6">
              <div class="bg-slate-900/40 border border-slate-800/60 rounded-xl p-4 mb-4 flex justify-between items-center">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-widest">
                  Soalan / Question {currentQuestionIdx + 1} daripada {activeQuiz.questions.length}
                </span>
                <span class="px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full text-[11px] text-indigo-400 font-bold">
                  Skor: {score}
                </span>
              </div>

              <div class="bg-slate-900/60 p-6 rounded-2xl border border-slate-800/80 shadow-xl backdrop-blur mb-6">
                <h3 class="text-base sm:text-lg font-bold text-slate-100 leading-relaxed mb-2">{activeQuestion.q}</h3>
                <p class="text-slate-400 italic text-sm border-l-2 border-indigo-500/40 pl-3 leading-relaxed">{activeQuestion.qM}</p>
              </div>

              <div class="space-y-3">
                {activeQuestion.options.map((option, idx) => {
                  let btnStyle = "bg-slate-900/40 border-slate-800 hover:border-slate-700 hover:bg-slate-900/80 text-slate-300";
                  if (isAnswered) {
                    if (option.isCorrect) btnStyle = "bg-emerald-950/40 border-emerald-500 text-emerald-300 shadow-emerald-950/20 shadow-md";
                    else if (selectedOption === option) btnStyle = "bg-rose-950/40 border-rose-500 text-rose-300 shadow-rose-950/20 shadow-md";
                    else btnStyle = "bg-slate-900/20 border-slate-900 text-slate-600 opacity-60";
                  }

                  return (
                    <button key={idx} onClick={() => handleOptionClick(option)} disabled={isAnswered} class={`w-full text-left p-4 rounded-xl border text-sm transition flex flex-col ${btnStyle}`}>
                      <span class="font-semibold text-white">{option.text}</span>
                      <span class="italic text-xs mt-0.5 opacity-80">{option.textM}</span>
                    </button>
                  );
                })}
              </div>

              <div class="mt-6 flex gap-3">
                <button onClick={() => setShowHint(!showHint)} class="px-4 py-3 bg-slate-900 text-slate-400 font-bold border border-slate-800 rounded-xl text-xs sm:text-sm tracking-wide transition hover:text-slate-200">
                  💡 Hint / Petunjuk
                </button>
              </div>

              {showHint && (
                <div class="mt-4 bg-amber-950/20 border border-amber-500/20 rounded-xl p-4 text-xs sm:text-sm text-amber-300 leading-relaxed">
                  <p class="font-bold mb-1">💡 English Hint:</p>
                  <p class="mb-2 text-slate-300">{activeQuestion.hint}</p>
                  <p class="font-bold mb-1 border-t border-amber-500/10 pt-2">🇲🇾 Petunjuk Melayu:</p>
                  <p class="text-slate-400 italic">{activeQuestion.hintM}</p>
                </div>
              )}
            </main>
          )}

          {/* --- DIALOG MODAL FOR EXPLANATION --- */}
          {showTipModal && selectedOption && (
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div class="bg-slate-900 border border-slate-800 w-full max-w-md p-6 rounded-2xl shadow-2xl animate-in fade-in zoom-in-95 duration-200">
                <div class="text-center mb-4">
                  {selectedOption.isCorrect ? (
                    <div>
                      <span class="inline-flex p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-2xl text-emerald-400">✨</span>
                      <h4 class="text-lg font-black text-emerald-400 mt-2 uppercase tracking-wide">Tahniah! / Correct!</h4>
                    </div>
                  ) : (
                    <div>
                      <span class="inline-flex p-3 bg-rose-500/10 border border-rose-500/20 rounded-full text-2xl text-rose-400">❌</span>
                      <h4 class="text-lg font-black text-rose-400 mt-2 uppercase tracking-wide">Kurang Tepat / Incorrect</h4>
                    </div>
                  )}
                </div>

                <div class="bg-slate-950/50 border border-slate-800/80 rounded-xl p-4 mb-5 space-y-3 max-h-[240px] overflow-y-auto">
                  <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-black">Your Answer / Pilihan Anda:</p>
                    <p class="text-slate-200 font-bold text-xs mt-0.5">{selectedOption.text}</p>
                    <p class="text-[11px] text-slate-500 italic">{selectedOption.textM}</p>
                  </div>

                  <div class="pt-2.5 border-t border-slate-800/80">
                    <p class="text-[10px] uppercase tracking-widest text-indigo-400 font-black">Book Fact / Info Ilmu Buku:</p>
                    <p class="text-slate-200 font-medium text-xs mt-1 leading-relaxed">{activeQuestion.tip}</p>
                    <p class="text-slate-400 italic text-[11px] mt-1 leading-relaxed border-l-2 border-indigo-500/50 pl-2">{activeQuestion.tipM}</p>
                  </div>
                </div>

                {selectedOption.isCorrect ? (
                  <button onClick={handleNext} class="w-full py-3.5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black rounded-xl text-xs sm:text-sm transition uppercase tracking-wider shadow-lg">
                    ➡ Continue Soalan Seterusnya
                  </button>
                ) : (
                  <button onClick={handleManualTryAgainDismiss} class="w-full py-3.5 bg-gradient-to-r from-rose-500 to-orange-500 text-white font-black rounded-xl text-xs sm:text-sm transition uppercase tracking-wider shadow-lg">
                    🔄 Re-attempt Question / Cuba Lagi
                  </button>
                )}
              </div>
            </div>
          )}

          <footer class="bg-slate-950 p-4 text-center border-t border-slate-900 text-slate-600 text-xs">
            <p>© 2026 Dr. MRAR. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<QuizApp />);
  </script>
</body>
</html>
